site_name: Code Claim Verifier
site_url: https://ugiordan.github.io/code-claim-verifier
repo_url: https://github.com/ugiordan/code-claim-verifier
repo_name: ugiordan/code-claim-verifier
edit_uri: edit/main/site/docs/
copyright: Copyright &copy; Red Hat, Inc.

theme:
  name: material
  language: en
  font:
    text: Red Hat Text
    code: Red Hat Mono
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - glightbox
  - git-revision-date-localized:
      enable_creation_date: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  css:
    - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Guides:
    - Claim Types: guides/claim-types.md
    - Custom Types: guides/custom-types.md
    - Batch Verification: guides/batch-verify.md
    - CLI Usage: guides/cli.md
  - Reference:
    - API: reference/api.md
    - Claim Taxonomy: reference/claim-taxonomy.md
    - Evaluation Framework: reference/eval.md
  - Architecture:
    - Overview: architecture/overview.md
    - Claim Chaining: architecture/chaining.md
